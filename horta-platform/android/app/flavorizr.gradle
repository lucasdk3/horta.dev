android {
    flavorDimensions += "flavor-type"

    productFlavors {
        dev {
            dimension "flavor-type"
            applicationId "dev.horta.platform.dev"
            resValue "string", "app_name", "Horta Dev"
        }
        stg {
            dimension "flavor-type"
            applicationId "dev.horta.platform.stg"
            resValue "string", "app_name", "Horta Stg"
        }
        prd {
            dimension "flavor-type"
            applicationId "dev.horta.platform"
            resValue "string", "app_name", "Horta"
        }
    }
}