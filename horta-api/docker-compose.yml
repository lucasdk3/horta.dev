version: '3.8'
services:
  # Base Infrastructure
  redis:
    image: redis:7
    ports:
      - "6399:6379"

  # Survey Service
  survey-api:
    build:
      context: .
      dockerfile: ./services/survey/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcloud-adc.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/app/gcloud-adc.json:ro
    depends_on:
      - redis

  dapr-sidecar-survey:
    image: "daprio/daprd:latest"
    command: ["./daprd", "-app-id", "survey-api", "-app-port", "8080", "-components-path", "/components"]
    volumes:
      - ./components:/components
    depends_on:
      - redis
      - survey-api

  # Auth Service
  auth-api:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcloud-adc.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/app/gcloud-adc.json:ro
    depends_on:
      - redis

  dapr-sidecar-auth:
    image: "daprio/daprd:latest"
    command: ["./daprd", "-app-id", "auth-api", "-app-port", "8081", "-components-path", "/components"]
    volumes:
      - ./components:/components
    depends_on:
      - redis
      - auth-api
